name: SBOM & Dependency Graph

on:
  push:
    branches: [ main, feature/sbom ]
  pull_request:
    branches: [ main, feature/sbom ]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write
  packages: write
  attestations: write
  security-events: write

jobs:
  sbom:
    name: Generate SBOM
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle

      - name: Generate aggregate SBOM
        run: ./gradlew cyclonedxAggregateBom -Dcyclonedx.configurations=runtimeClasspath

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@v4
        with:
          name: sbom
          path: build/reports/bom.*

      - name: Submit dependency graph to GitHub
        uses: gradle/actions/dependency-submission@v3
