name: ORT Analyze

on:
  push:
    branches:
      - main
      - develop
      - feature/sbom
  pull_request:

permissions:
  contents: read
  id-token: write
  attestations: write
  actions: read
  packages: read
  security-events: write

jobs:
  ort-analyze:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v3
        with:
          distribution: temurin
          java-version: 21

#      - name: Submit dependency graph to GitHub
#        uses: gradle/actions/dependency-submission@v3

      - name: Download ORT CLI
        run: |
          ORT_VERSION=59.3.0
          curl -sSLO https://github.com/oss-review-toolkit/ort/releases/download/${ORT_VERSION}/ort-${ORT_VERSION}.zip
          unzip ort-${ORT_VERSION}.zip -d ort
          echo "ORT_HOME=$(pwd)/ort/ort-${ORT_VERSION}" >> $GITHUB_ENV
          echo "$(pwd)/ort/ort-${ORT_VERSION}/bin" >> $GITHUB_PATH

      - name: Run ORT Analyze
        run: |
          ort analyze \
            -i . \
            -o ort-results

      - name: Generate ORT HTML Report
        run: |
          ort report \
            -i ort-results/analyzer-result.yml \
            -o ort-report \
            -f WebApp

      - name: Upload ORT HTML Report
        uses: actions/upload-artifact@v4
        with:
          name: ort-html-report
          path: ort-report/report-web-app.html
