name: ORT SBOM Report

on:
  workflow_dispatch:
  push:
    branches: [ main, feature/sbom ]
  pull_request:
    branches: [ main ]

jobs:
  ort:
    name: Generate ORT SBOM
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up JDK 21
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Download and extract ORT
        run: |
          ORT_VERSION=59.3.0
          curl -sSLO https://github.com/oss-review-toolkit/ort/releases/download/v${ORT_VERSION}/ort-${ORT_VERSION}.tgz
          tar -xzf ort-${ORT_VERSION}.tgz
          echo "$PWD/ort-${ORT_VERSION}/bin" >> $GITHUB_PATH

      - name: Run ORT analyzer
        run: |
          ort analyze -i . -o ort-results

      - name: Run ORT reporter
        run: |
          ort report -i ort-results/analyzer-result.yml -o ort-results -f CycloneDx,WebApp

      - name: Upload ORT WebApp report
        uses: actions/upload-artifact@v3
        with:
          name: ort-webapp-report
          path: ort-results/report-web-app.html

      - name: Upload ORT CycloneDX SBOM
        uses: actions/upload-artifact@v3
        with:
          name: ort-cyclonedx-sbom
          path: ort-results/report-cyclonedx.json

      - name: Upload dependency graph
        uses: actions/upload-artifact@v3
        with:
          name: ort-analyzer-result
          path: ort-results/analyzer-result.yml
