name: ORT SBOM & Dependency Graph

on:
  push:
    branches:
      - main
      - develop
      - feature/sbom
  pull_request:
    branches:
      - main
      - develop
      - feature/sbom
  workflow_dispatch:

jobs:
  ort:
    name: Run OSS Review Toolkit
    runs-on: ubuntu-latest

    env:
      ORT_VERSION: 59.3.0

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Java (same as Android project)
        uses: actions/setup-java@v3
        with:
          distribution: temurin
          java-version: 21

      - name: Download and extract ORT CLI
        run: |
          curl -sSLO https://github.com/oss-review-toolkit/ort/releases/download/v${ORT_VERSION}/ort-${ORT_VERSION}.tgz
          tar -xzf ort-${ORT_VERSION}.tgz
          echo "$PWD/ort-${ORT_VERSION}/bin" >> $GITHUB_PATH

      - name: Run ORT analyzer
        run: |
          ort analyze -i . -o ort-results \
            --vcs-url=https://github.com/${{ github.repository }}.git \
            --vcs-revision=${{ github.sha }} \
            --vcs-type=Git

      - name: Generate CycloneDX and HTML report
        run: |
          ort report \
            -i ort-results/analyzer-result.yml \
            -o ort-report \
            -f CycloneDx,WebApp

      - name: Upload ORT HTML report
        uses: actions/upload-artifact@v3.1.2
        with:
          name: ort-html-report
          path: ort-report/report-web-app.html

      - name: Upload CycloneDX SBOM
        uses: actions/upload-artifact@v3.1.2
        with:
          name: ort-cyclonedx-sbom
          path: ort-report/report-cyclonedx.json

      - name: Upload dependency graph to GitHub
        uses: gradle/actions/dependency-submission@v3
